---
- name: Install unattended-upgrades packages
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - apt-listchanges
    state: present
    update_cache: true

- name: Configure periodic apt automation
  ansible.builtin.template:
    src: 20auto-upgrades.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"

- name: Configure unattended-upgrades policy
  ansible.builtin.template:
    src: 52linux-server-setup-unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/52linux-server-setup-unattended-upgrades
    owner: root
    group: root
    mode: "0644"
