---
- name: Verify Debian server baseline
  hosts: all
  gather_facts: true
  become: true

  tasks:
    - name: Check SSH configuration syntax
      ansible.builtin.command: sshd -t
      changed_when: false
      tags:
        - verify

    - name: Check Docker CLI version
      ansible.builtin.command: docker --version
      changed_when: false
      when: linux_server_setup_manage_docker | bool
      tags:
        - verify

    - name: Check Docker Compose plugin version
      ansible.builtin.command: docker compose version
      changed_when: false
      when: linux_server_setup_manage_docker | bool
      tags:
        - verify

    - name: Check Docker daemon is active
      ansible.builtin.command: systemctl is-active docker
      changed_when: false
      when: linux_server_setup_manage_docker | bool
      tags:
        - verify

    - name: Check Docker daemon is enabled
      ansible.builtin.command: systemctl is-enabled docker
      changed_when: false
      when: linux_server_setup_manage_docker | bool
      tags:
        - verify

    - name: Check DNS resolution works through configured path
      ansible.builtin.command: getent hosts debian.org
      changed_when: false
      when: linux_server_setup_manage_resolver | bool
      tags:
        - verify

    - name: Check that UFW is active
      ansible.builtin.command: ufw status verbose
      changed_when: false
      when: linux_server_setup_manage_firewall | bool
      tags:
        - verify

    - name: Check unattended-upgrades dry run
      ansible.builtin.command: unattended-upgrade --dry-run --debug
      changed_when: false
      when: linux_server_setup_manage_unattended_upgrades | bool
      tags:
        - verify
